<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Muthumaari & Sambathraj - Engagement Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
:root {
  --peacock-dark: #062c2c;
  --peacock-teal: #0d5f5f;
  --gold: #d4af37;
  --light-gold: #f3e5ab;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(212, 175, 55, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Cormorant Garamond', serif; 
  background-color: var(--peacock-dark); 
  color: #fff; 
  overflow-x: hidden;
}

/* Enhanced Background */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  background: radial-gradient(circle at center, #0d5f5f 0%, #062c2c 100%);
  overflow: hidden;
}

/* Floating Feather/Petal Styles */
.falling-element {
  position: fixed;
  top: -10%;
  z-index: 1;
  pointer-events: none;
  user-select: none;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0vh) rotate(0deg) translateX(0px); opacity: 0; }
  10% { opacity: var(--max-opac); }
  90% { opacity: var(--max-opac); }
  100% { transform: translateY(110vh) rotate(720deg) translateX(50px); opacity: 0; }
}

/* Photo Styling */
.photo-wrap {
  position: relative;
  z-index: 5;
  width: 220px;
  height: 220px;
  margin-bottom: 30px;
}

.photo-wrap img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--gold);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.ring-anim {
  position: absolute;
  inset: -15px;
  border: 2px dashed var(--gold);
  border-radius: 50%;
  animation: spin 20s linear infinite;
  opacity: 0.6;
}

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Typography */
.names {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  color: var(--light-gold);
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
  margin: 15px 0;
}

.countdown-container {
  display: flex;
  gap: 15px;
  margin-top: 30px;
  z-index: 5;
}

.cd-box {
  background: var(--glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  padding: 15px;
  border-radius: 12px;
  min-width: 70px;
}

.cd-num { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold); display: block; }
.cd-lbl { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }

.details-card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  padding: 30px;
  border-radius: 20px;
  margin: 40px 20px;
  max-width: 500px;
  z-index: 5;
  position: relative;
}

.rsvp-btn {
  display: inline-block;
  background: var(--gold);
  color: var(--peacock-dark);
  padding: 15px 35px;
  border-radius: 50px;
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-weight: bold;
  margin-top: 20px;
  transition: transform 0.3s ease;
}

.rsvp-btn:hover { transform: scale(1.05); }

</style>
</head>
<body>

<div id="ambient-container"></div>

<section class="hero">
  <div class="photo-wrap">
    <div class="ring-anim"></div>
    <img src="IMG20260426193321.jpg" alt="Muthumaari & Sambathraj">
  </div>

  <p style="font-family:'Cinzel'; letter-spacing: 4px; color: var(--gold); font-size: 0.8rem;">THE ENGAGEMENT OF</p>
  <h1 class="names">Muthumaari & Sambathraj</h1>
  
  <div class="countdown-container">
    <div class="cd-box"><span class="cd-num" id="d">00</span><span class="cd-lbl">Days</span></div>
    <div class="cd-box"><span class="cd-num" id="h">00</span><span class="cd-lbl">Hrs</span></div>
    <div class="cd-box"><span class="cd-num" id="m">00</span><span class="cd-lbl">Min</span></div>
    <div class="cd-box"><span class="cd-num" id="s">00</span><span class="cd-lbl">Sec</span></div>
  </div>

  <div class="details-card">
    <h2 style="font-family:'Cinzel'; color: var(--gold); margin-bottom: 15px;">Save The Date</h2>
    <p style="font-size: 1.4rem;">MAY 29, 2026</p>
    <p style="font-style: italic; opacity: 0.8; margin: 10px 0;">9:30 AM - 10:30 AM</p>
    <p style="margin-top: 15px; font-weight: bold;">Navneetha Krishna Kovil Mahal</p>
    <p style="font-size: 0.9rem; opacity: 0.7;">Sengottai</p>
    
    <a href="https://wa.me/919688849589" class="rsvp-btn">RSVP ON WHATSAPP</a>
  </div>
</section>

<script>
// Countdown Timer
function updateTimer() {
  const target = new Date('May 29, 2026 09:30:00').getTime();
  const now = new Date().getTime();
  const diff = target - now;

  if (diff > 0) {
    document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000);
  }
}
setInterval(updateTimer, 1000);
updateTimer();

// Falling Elements (Feathers & Petals)
const container = document.getElementById('ambient-container');
const items = ['🦚', '🌸', '🍃', '✨']; // Peacock feather, petal, leaf, spark

function createFallingItem() {
  const el = document.createElement('div');
  const type = items[Math.floor(Math.random() * items.length)];
  
  el.className = 'falling-element';
  el.innerText = type;
  
  // Randomize visuals
  const size = Math.random() * (1.5 - 0.5) + 0.5;
  const left = Math.random() * 100;
  const duration = Math.random() * (15 - 7) + 7;
  const opacity = type === '🦚' ? 0.2 : 0.4; // Feathers are more subtle

  el.style.left = left + 'vw';
  el.style.fontSize = size + 'rem';
  el.style.animationDuration = duration + 's';
  el.style.setProperty('--max-opac', opacity);
  
  container.appendChild(el);

  // Remove element after animation ends to save memory
  setTimeout(() => { el.remove(); }, duration * 1000);
}

// Generate items continuously
setInterval(createFallingItem, 400);
</script>

</body>
</html>
